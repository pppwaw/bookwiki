name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev,runtime]"

      - name: Run smoke tests
        env:
          BOOKWIKI_TEST_LLM: "1"
        run: pytest -k smoke -v
